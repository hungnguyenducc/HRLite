name: Trigger Jenkins Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  trigger-jenkins:
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: ${{ github.ref_name }}
      COMMIT_SHA: ${{ github.sha }}
    steps:
      - name: Trigger Jenkins Build
        env:
          JENKINS_URL: ${{ secrets.JENKINS_URL }}
          JENKINS_JOB: ${{ secrets.JENKINS_JOB_NAME }}
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_TOKEN: ${{ secrets.JENKINS_API_TOKEN }}
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "${JENKINS_URL}/job/${JENKINS_JOB}/build" \
            --user "${JENKINS_USER}:${JENKINS_TOKEN}" \
            --data-urlencode json="{\"parameter\": [{\"name\":\"BRANCH\",\"value\":\"${BRANCH_NAME}\"},{\"name\":\"COMMIT\",\"value\":\"${COMMIT_SHA}\"}]}")

          if [ "$RESPONSE" -eq 201 ] || [ "$RESPONSE" -eq 200 ]; then
            echo "Jenkins build triggered successfully (HTTP $RESPONSE)"
          else
            echo "Failed to trigger Jenkins build (HTTP $RESPONSE)"
            exit 1
          fi

      - name: Wait for Jenkins Build
        env:
          JENKINS_URL: ${{ secrets.JENKINS_URL }}
          JENKINS_JOB: ${{ secrets.JENKINS_JOB_NAME }}
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_TOKEN: ${{ secrets.JENKINS_API_TOKEN }}
        run: |
          echo "Waiting for Jenkins to pick up the build..."
          sleep 10

          BUILD_INFO=$(curl -s \
            "${JENKINS_URL}/job/${JENKINS_JOB}/lastBuild/api/json" \
            --user "${JENKINS_USER}:${JENKINS_TOKEN}")

          BUILD_NUMBER=$(echo "$BUILD_INFO" | jq -r '.number')
          echo "Jenkins Build #${BUILD_NUMBER} started"
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> "$GITHUB_ENV"

      - name: Poll Jenkins Build Status
        env:
          JENKINS_URL: ${{ secrets.JENKINS_URL }}
          JENKINS_JOB: ${{ secrets.JENKINS_JOB_NAME }}
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_TOKEN: ${{ secrets.JENKINS_API_TOKEN }}
        run: |
          MAX_ATTEMPTS=60
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            RESULT=$(curl -s \
              "${JENKINS_URL}/job/${JENKINS_JOB}/${BUILD_NUMBER}/api/json" \
              --user "${JENKINS_USER}:${JENKINS_TOKEN}")

            BUILDING=$(echo "$RESULT" | jq -r '.building')
            STATUS=$(echo "$RESULT" | jq -r '.result')

            if [ "$BUILDING" = "false" ]; then
              echo "Jenkins Build #${BUILD_NUMBER} finished: ${STATUS}"

              if [ "$STATUS" = "SUCCESS" ]; then
                exit 0
              else
                echo "Build URL: ${JENKINS_URL}/job/${JENKINS_JOB}/${BUILD_NUMBER}/console"
                exit 1
              fi
            fi

            ATTEMPT=$((ATTEMPT + 1))
            echo "Build in progress... (attempt ${ATTEMPT}/${MAX_ATTEMPTS})"
            sleep 30
          done

          echo "Timeout waiting for Jenkins build"
          exit 1
        timeout-minutes: 30
