services:
  postgres:
    image: postgres:16-alpine
    container_name: hrlite_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hrlite
      POSTGRES_PASSWORD: hrlite
      POSTGRES_DB: hrlite
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrlite -d hrlite"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
