services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: hrlite_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hrlite
      POSTGRES_PASSWORD: hrlite
      POSTGRES_DB: hrlite
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrlite -d hrlite"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- HRLite App ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hrlite_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://hrlite:hrlite@postgres:5432/hrlite
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: local-dev-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 3

  # --- Jenkins ---
  jenkins:
    build:
      context: ./docker/jenkins
      dockerfile: Dockerfile
    container_name: hrlite_jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      JAVA_OPTS: "-Djava.awt.headless=true"

volumes:
  postgres_data:
  jenkins_data:
